<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120" role="img" aria-label="Dalboviken Fastigheter logotyp">
  <style><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap');
    .lbl-sub { font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; font-weight:400; letter-spacing:0.2em; fill:#1C1C1E; }
    .lbl-main { font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:21px; font-weight:400; letter-spacing:0.15em; fill:#1C1C1E; }
  ]]></style>

  <!-- Official Fastigheter gem symbol, scaled 512→80 inside 20,20 offset -->
  <svg x="20" y="20" width="80" height="80" viewBox="0 0 512 512" shape-rendering="geometricPrecision">
    <defs>
      <linearGradient id="lf-f1" x1="313" y1="159" x2="256" y2="256" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#F5F5F5"/><stop offset="100%" stop-color="#D0D0D0"/>
      </linearGradient>
      <linearGradient id="lf-f2" x1="369" y1="256" x2="256" y2="256" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#ACACAC"/><stop offset="100%" stop-color="#646464"/>
      </linearGradient>
      <linearGradient id="lf-f3" x1="313" y1="354" x2="256" y2="256" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#222222"/><stop offset="100%" stop-color="#050505"/>
      </linearGradient>
      <linearGradient id="lf-f4" x1="200" y1="354" x2="256" y2="256" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#3C3C3C"/><stop offset="100%" stop-color="#161616"/>
      </linearGradient>
      <linearGradient id="lf-f5" x1="143" y1="256" x2="256" y2="256" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#848484"/><stop offset="100%" stop-color="#484848"/>
      </linearGradient>
      <linearGradient id="lf-f6" x1="200" y1="159" x2="256" y2="256" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FEFEFE"/><stop offset="100%" stop-color="#DCDCDC"/>
      </linearGradient>
      <radialGradient id="lf-shine" cx="204" cy="150" r="88" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      </radialGradient>
      <clipPath id="lf-gem">
        <polygon points="256,126 369,191 369,321 256,386 143,321 143,191"/>
      </clipPath>
    </defs>
    <circle cx="256" cy="256" r="208" stroke="#111111" stroke-width="22" fill="none"/>
    <polygon points="256,256 256,126 369,191" fill="url(#lf-f1)" stroke="url(#lf-f1)" stroke-width="0.6"/>
    <polygon points="256,256 369,191 369,321" fill="url(#lf-f2)" stroke="url(#lf-f2)" stroke-width="0.6"/>
    <polygon points="256,256 369,321 256,386" fill="url(#lf-f3)" stroke="url(#lf-f3)" stroke-width="0.6"/>
    <polygon points="256,256 256,386 143,321" fill="url(#lf-f4)" stroke="url(#lf-f4)" stroke-width="0.6"/>
    <polygon points="256,256 143,321 143,191" fill="url(#lf-f5)" stroke="url(#lf-f5)" stroke-width="0.6"/>
    <polygon points="256,256 143,191 256,126" fill="url(#lf-f6)" stroke="url(#lf-f6)" stroke-width="0.6"/>
    <rect width="512" height="512" fill="url(#lf-shine)" clip-path="url(#lf-gem)"/>
    <polygon points="256,126 369,191 369,321 256,386 143,321 143,191" fill="none" stroke="#111111" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>

  <!-- Vertical divider -->
  <line x1="118" y1="26" x2="118" y2="94" stroke="rgba(28,28,30,0.18)" stroke-width="1"/>

  <!-- Company name -->
  <text class="lbl-sub" x="138" y="48" opacity="0.5">DALBOVIKEN</text>
  <text class="lbl-main" x="138" y="78">FASTIGHETER</text>
</svg>
